<!-- Splash Intro Screen -->
<div id="splash-intro" class="splash-intro">
  <div class="splash-content">
    <div class="splash-logo">
      <span class="splash-text reality">Reality</span>
      <span class="splash-text lab">Lab</span>
    </div>
    <div class="splash-tagline">AI Research Laboratory</div>
    <div class="splash-loader">
      <div class="loader-bar"></div>
    </div>
  </div>
</div>

<style>
.splash-intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
  opacity: 1;
  transition: opacity 0.5s ease-out;
}

.splash-intro.fade-out {
  opacity: 0;
  pointer-events: none;
}

.splash-intro.hidden {
  display: none;
}

.splash-content {
  text-align: center;
}

.splash-logo {
  display: flex;
  justify-content: center;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 20px;
}

.splash-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  opacity: 0;
  transform: translateY(30px);
}

.splash-text.reality {
  font-size: 4rem;
  background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: slideUp 0.6s ease-out 0.2s forwards;
}

.splash-text.lab {
  font-size: 4rem;
  background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: slideUp 0.6s ease-out 0.4s forwards;
}

.splash-tagline {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.1rem;
  color: rgba(0, 0, 0, 0.5);
  letter-spacing: 4px;
  text-transform: uppercase;
  opacity: 0;
  animation: fadeIn 0.6s ease-out 0.7s forwards;
  margin-bottom: 40px;
}

.splash-loader {
  width: 200px;
  height: 3px;
  background: rgba(0, 0, 0, 0.1);
  border-radius: 3px;
  margin: 0 auto;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 0.3s ease-out 0.9s forwards;
}

.loader-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #4facfe 0%, #00f2fe 50%, #f093fb 100%);
  border-radius: 3px;
  animation: loadProgress 1.5s ease-out 1s forwards;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

@keyframes loadProgress {
  from {
    width: 0%;
  }
  to {
    width: 100%;
  }
}

/* Responsive */
@media (max-width: 768px) {
  .splash-text.reality,
  .splash-text.lab {
    font-size: 2.5rem;
  }

  .splash-tagline {
    font-size: 0.85rem;
    letter-spacing: 2px;
  }

  .splash-loader {
    width: 150px;
  }
}
</style>

<script>
(function() {
  // Check if intro was already shown in this session
  if (sessionStorage.getItem('splashShown')) {
    // Hide splash immediately
    var splash = document.getElementById('splash-intro');
    if (splash) {
      splash.classList.add('hidden');
    }
    return;
  }

  // Mark as shown for this session
  sessionStorage.setItem('splashShown', 'true');

  // Wait for animation to complete (2.5 seconds total)
  setTimeout(function() {
    var splash = document.getElementById('splash-intro');
    if (splash) {
      splash.classList.add('fade-out');

      // Remove from DOM after fade out
      setTimeout(function() {
        splash.classList.add('hidden');
      }, 500);
    }
  }, 2500);
})();
</script>
