<!-- Splash Intro Screen -->
<div id="splash-intro" class="splash-intro">
  <div class="splash-content">
    <div class="splash-logo" id="splash-logo">
      <span class="splash-text reality">Reality</span>
      <span class="splash-text lab">Lab</span>
    </div>
  </div>
</div>

<style>
.splash-intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ffffff;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;
  opacity: 1;
  transition: opacity 0.6s ease-out;
}

.splash-intro.fade-out {
  opacity: 0;
  pointer-events: none;
}

.splash-intro.hidden {
  display: none;
}

.splash-content {
  text-align: center;
}

.splash-logo {
  display: flex;
  justify-content: center;
  align-items: baseline;
  gap: 12px;
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.splash-logo.moving {
  position: fixed;
}

.splash-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  opacity: 0;
  transform: translateY(30px);
}

.splash-text.reality {
  font-size: 5rem;
  color: #212529;
  animation: slideUp 0.6s ease-out 0.2s forwards;
}

.splash-text.lab {
  font-size: 5rem;
  color: #3B82F6;
  animation: slideUp 0.6s ease-out 0.4s forwards;
}

.splash-logo.moving .splash-text {
  transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Responsive */
@media (max-width: 768px) {
  .splash-text.reality,
  .splash-text.lab {
    font-size: 2.8rem;
  }

  .splash-logo {
    gap: 8px;
  }
}
</style>

<script>
(function() {
  // Check if intro was already shown in this session
  if (sessionStorage.getItem('splashShown')) {
    var splash = document.getElementById('splash-intro');
    if (splash) {
      splash.classList.add('hidden');
    }
    return;
  }

  // Mark as shown for this session
  sessionStorage.setItem('splashShown', 'true');

  // Phase 1: Show text animation (1.2s)
  // Phase 2: Move to target position (0.8s)
  // Phase 3: Fade out (0.5s)

  setTimeout(function() {
    var splash = document.getElementById('splash-intro');
    var splashLogo = document.getElementById('splash-logo');

    // Find the target element on the page
    var targetText = document.querySelector('.reality-lab-text');

    if (targetText && splashLogo) {
      // Get target position
      var targetRect = targetText.getBoundingClientRect();
      var splashRect = splashLogo.getBoundingClientRect();

      // Calculate the scale (target is smaller)
      var targetFontSize = window.getComputedStyle(targetText).fontSize;
      var currentFontSize = window.getComputedStyle(splashLogo.querySelector('.splash-text')).fontSize;
      var scale = parseFloat(targetFontSize) / parseFloat(currentFontSize);

      // Calculate movement
      var targetCenterX = targetRect.left + targetRect.width / 2;
      var targetCenterY = targetRect.top + targetRect.height / 2;
      var currentCenterX = splashRect.left + splashRect.width / 2;
      var currentCenterY = splashRect.top + splashRect.height / 2;

      var moveX = targetCenterX - currentCenterX;
      var moveY = targetCenterY - currentCenterY;

      // Apply movement and scale
      splashLogo.classList.add('moving');
      splashLogo.style.transform = 'translate(' + moveX + 'px, ' + moveY + 'px) scale(' + scale + ')';
      splashLogo.style.opacity = '0';

      // Fade out splash background
      setTimeout(function() {
        splash.classList.add('fade-out');

        setTimeout(function() {
          splash.classList.add('hidden');
        }, 600);
      }, 600);

    } else {
      // Fallback: just fade out
      splash.classList.add('fade-out');
      setTimeout(function() {
        splash.classList.add('hidden');
      }, 600);
    }

  }, 1400); // Wait for initial animation
})();
</script>
