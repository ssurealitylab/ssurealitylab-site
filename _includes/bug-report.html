<!-- Bug Report Modal (Triggered from Footer) -->
<div id="bug-report-modal" class="bug-modal" style="display: none;">
  <div class="bug-modal-backdrop"></div>
  <div class="bug-modal-content">
    <div class="bug-modal-header">
      <h3>🐛 버그 리포트</h3>
      <button class="bug-modal-close" onclick="closeBugReportModal()">&times;</button>
    </div>
    <div class="bug-modal-body">
      <p>발견하신 버그를 알려주세요. 익명으로 GitHub 이슈가 생성됩니다.</p>

      <div class="bug-form-group">
        <label for="bug-title">제목 <span class="required">*</span></label>
        <input type="text" id="bug-title" class="bug-input" placeholder="버그를 간단히 설명해주세요" maxlength="100">
      </div>

      <div class="bug-form-group">
        <label for="bug-description">상세 설명 <span class="required">*</span></label>
        <textarea id="bug-description" class="bug-textarea" placeholder="버그가 발생한 상황을 자세히 설명해주세요&#10;&#10;예시:&#10;- 어떤 페이지에서 발생했나요?&#10;- 어떤 동작을 했을 때 발생했나요?&#10;- 예상했던 동작은 무엇인가요?&#10;- 실제로 어떻게 동작했나요?" maxlength="1000"></textarea>
        <div class="bug-char-count">
          <span id="bug-char-count">0</span> / 1000
        </div>
      </div>
    </div>
    <div class="bug-modal-footer">
      <button class="bug-btn-secondary" onclick="closeBugReportModal()">취소</button>
      <button class="bug-btn-primary" id="bug-submit-btn" onclick="submitBugReport()">제출하기</button>
    </div>
  </div>
</div>

<style>
/* Bug Report Modal */
.bug-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bug-modal-backdrop {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.bug-modal-content {
  position: relative;
  background: rgba(255, 255, 255, 0.98);
  border-radius: 16px;
  width: 90%;
  max-width: 600px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  z-index: 10;
  animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.bug-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 28px;
  border-bottom: 1px solid #e5e7eb;
  background: linear-gradient(135deg, rgba(239, 68, 68, 0.1) 0%, rgba(220, 38, 38, 0.15) 100%);
  border-radius: 16px 16px 0 0;
}

.bug-modal-header h3 {
  margin: 0;
  font-size: 20px;
  font-weight: 700;
  color: #1a1a1a;
}

.bug-modal-close {
  background: none;
  border: none;
  font-size: 32px;
  cursor: pointer;
  color: #6b7280;
  padding: 0;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: all 0.2s ease;
  line-height: 1;
}

.bug-modal-close:hover {
  background: rgba(0, 0, 0, 0.1);
  color: #1a1a1a;
}

.bug-modal-body {
  padding: 28px;
}

.bug-modal-body > p {
  margin: 0 0 24px 0;
  color: #4b5563;
  font-size: 14px;
  line-height: 1.6;
}

.bug-form-group {
  margin-bottom: 20px;
}

.bug-form-group label {
  display: block;
  margin-bottom: 8px;
  color: #1f2937;
  font-size: 14px;
  font-weight: 600;
}

.required {
  color: #ef4444;
}

.bug-input,
.bug-textarea {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #e5e7eb;
  border-radius: 10px;
  font-size: 14px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  outline: none;
  transition: border-color 0.2s ease;
  box-sizing: border-box;
}

.bug-input:focus,
.bug-textarea:focus {
  border-color: #ef4444;
}

.bug-textarea {
  min-height: 180px;
  resize: vertical;
  line-height: 1.6;
}

.bug-char-count {
  text-align: right;
  margin-top: 6px;
  font-size: 12px;
  color: #6b7280;
}

.bug-modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  padding: 20px 28px;
  border-top: 1px solid #e5e7eb;
  background: #f9fafb;
  border-radius: 0 0 16px 16px;
}

.bug-btn-secondary,
.bug-btn-primary {
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.bug-btn-secondary {
  background: #f3f4f6;
  color: #374151;
}

.bug-btn-secondary:hover {
  background: #e5e7eb;
}

.bug-btn-primary {
  background: #ef4444;
  color: white;
}

.bug-btn-primary:hover {
  background: #dc2626;
}

.bug-btn-primary:disabled {
  background: #9ca3af;
  cursor: not-allowed;
  opacity: 0.6;
}

/* Mobile responsive */
@media (max-width: 768px) {
  .bug-modal-content {
    width: 95%;
    max-height: 90vh;
  }

  .bug-modal-header,
  .bug-modal-body,
  .bug-modal-footer {
    padding: 20px;
  }

  .bug-modal-header h3 {
    font-size: 18px;
  }
}
</style>

<script>
// Bug Report Modal functionality
function openBugReportModal() {
  const modal = document.getElementById('bug-report-modal');
  if (modal) {
    modal.style.display = 'flex';
    document.getElementById('bug-title').focus();
  }
}

function closeBugReportModal() {
  const modal = document.getElementById('bug-report-modal');
  if (modal) {
    modal.style.display = 'none';
    // Clear form
    document.getElementById('bug-title').value = '';
    document.getElementById('bug-description').value = '';
    document.getElementById('bug-char-count').textContent = '0';
  }
}

// Character counter
document.addEventListener('DOMContentLoaded', function() {
  const bugDescription = document.getElementById('bug-description');
  const charCount = document.getElementById('bug-char-count');

  if (bugDescription && charCount) {
    bugDescription.addEventListener('input', function() {
      charCount.textContent = this.value.length;
    });
  }

  // Close modal on backdrop click
  const backdrop = document.querySelector('.bug-modal-backdrop');
  if (backdrop) {
    backdrop.addEventListener('click', closeBugReportModal);
  }

  // Close on ESC key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const modal = document.getElementById('bug-report-modal');
      if (modal && modal.style.display === 'flex') {
        closeBugReportModal();
      }
    }
  });
});

// Get AI server endpoint (from chatbot.html)
function getBugReportEndpoint() {
  // Use the same endpoint as chatbot
  const DIRECT_AI_SERVER_URL = 'https://luxury-deluxe-scored-tolerance.trycloudflare.com';
  return `${DIRECT_AI_SERVER_URL}/submit-bug-report`;
}

// Submit bug report
async function submitBugReport() {
  const title = document.getElementById('bug-title').value.trim();
  const description = document.getElementById('bug-description').value.trim();
  const submitBtn = document.getElementById('bug-submit-btn');

  // Validation
  if (!title) {
    alert('제목을 입력해주세요.');
    document.getElementById('bug-title').focus();
    return;
  }

  if (!description) {
    alert('상세 설명을 입력해주세요.');
    document.getElementById('bug-description').focus();
    return;
  }

  // Disable submit button
  submitBtn.disabled = true;
  submitBtn.textContent = '제출 중...';

  try {
    const endpoint = getBugReportEndpoint();

    // Get page info
    const pageUrl = window.location.href;
    const userAgent = navigator.userAgent;

    const response = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        title: title,
        description: description,
        page_url: pageUrl,
        user_agent: userAgent
      })
    });

    const result = await response.json();

    if (result.success) {
      alert(`✅ 버그 리포트가 제출되었습니다!\n\nGitHub 이슈 #${result.issue_number}로 등록되었습니다.\n소중한 피드백 감사합니다!`);
      closeBugReportModal();
    } else {
      throw new Error(result.error || '알 수 없는 오류');
    }
  } catch (error) {
    console.error('Bug report submission error:', error);
    alert('❌ 버그 리포트 제출 중 오류가 발생했습니다.\n\n잠시 후 다시 시도해주세요.');
  } finally {
    // Re-enable submit button
    submitBtn.disabled = false;
    submitBtn.textContent = '제출하기';
  }
}
</script>
